<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" role="img" aria-label="Ingenious Hub — energize your brand">
  <style>
    .word { font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 400; fill: #1FB6A6; letter-spacing: -0.02em; }
    .tag  { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; fill: #6B7B82; letter-spacing: 0.02em; }
  </style>
  <!-- Hand-tuned mark — lowercase 'i' with offset teal dot -->
  <g transform="translate(8 14)">
    <circle cx="20" cy="14" r="6.5" fill="#1FB6A6"/>
    <rect x="14.5" y="26" width="11" height="56" rx="1.6" fill="#1FB6A6"/>
  </g>
  <!-- Wordmark + tag -->
  <text class="word" x="58" y="62" font-size="56">ngenious hub</text>
  <text class="tag"  x="60" y="86" font-size="14">energize your brand</text>
</svg>
